<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion - BG Remover</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .box { background: #161b22; border: 1px solid #21262d; border-radius: 12px; padding: 40px; width: 360px; }
  h1 { font-size: 1.5rem; margin-bottom: 24px; text-align: center; }
  input { width: 100%; padding: 12px; border: 1px solid #30363d; border-radius: 6px; background: #0d1117; color: #e6edf3; font-size: 1rem; margin-bottom: 16px; }
  input:focus { outline: none; border-color: #58a6ff; }
  .btn { width: 100%; padding: 12px; background: #1f6feb; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
  .btn:hover { background: #388bfd; }
  .error { color: #f85149; text-align: center; margin-bottom: 16px; font-size: 0.9rem; }
  .back { display: block; text-align: center; margin-top: 16px; color: #484f58; text-decoration: none; font-size: 0.85rem; }
</style>
</head>
<body>
<div class="box">
  <h1>&#x1F512; Administration</h1>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post">
    <input type="password" name="password" placeholder="Mot de passe" required>
    <button type="submit" class="btn">Se connecter</button>
  </form>
  <a href="/" class="back">&#x2190; Retour</a>
</div>
</body>
</html>
